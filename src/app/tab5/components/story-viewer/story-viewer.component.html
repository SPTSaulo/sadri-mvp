<!-- Fullscreen Story Viewer -->
<div class="story-viewer" [class.edit-mode]="isEditMode">
  
  <!-- Close Button Overlay -->
  <ion-button 
    class="close-button" 
    fill="clear" 
    (click)="closeViewer(); $event.stopPropagation()">
    <ion-icon name="close" slot="icon-only"></ion-icon>
  </ion-button>

  <!-- Edit Mode Toggle Button -->
  <ion-button 
    class="edit-button" 
    fill="solid"
    (click)="toggleEditMode(); $event.stopPropagation()">
    <ion-icon [name]="isEditMode ? 'checkmark' : 'create'" slot="start"></ion-icon>
    {{ isEditMode ? 'Guardar' : 'Editar' }}
  </ion-button>

  <!-- Add Photos Button -->
  <ion-button 
    class="add-photos-button" 
    fill="solid"
    (click)="openPhotoUploader(); $event.stopPropagation()">
    <ion-icon name="add-circle" slot="start"></ion-icon>
    Añadir
  </ion-button>

  <!-- Progress Indicators for Each Photo (hidden in edit mode) -->
  <div class="progress-indicators" *ngIf="!isEditMode">
    <div 
      *ngFor="let photo of photos; let i = index" 
      class="progress-indicator"
      [class.active]="i === currentPhotoIndex"
      [class.completed]="i < currentPhotoIndex">
      <div 
        class="progress-bar" 
        [style.width.%]="i === currentPhotoIndex ? progressPercentage : (i < currentPhotoIndex ? 100 : 0)">
      </div>
    </div>
  </div>

  <!-- Photo Counter (hidden in edit mode) -->
  <div class="photo-counter" *ngIf="!isEditMode">
    {{ getPhotoCounter() }}
  </div>

  <!-- Normal Viewing Mode -->
  <div *ngIf="!isEditMode" (click)="handleTap($event)">
    <!-- Empty State Message -->
    <div class="empty-state" *ngIf="photos.length === 0">
      <ion-icon name="images-outline" class="empty-state-icon"></ion-icon>
      <p>No hay historias para este viaje todavía</p>
      <p class="empty-state-hint">Toca el botón "Añadir" para agregar fotos</p>
    </div>

    <!-- Current Photo Display -->
    <div class="photo-container" *ngIf="getCurrentPhoto()">
      <ion-img 
        [src]="getCurrentPhoto()?.url" 
        class="fullscreen-photo"
        loading="lazy">
      </ion-img>
    </div>
  </div>

  <!-- Delete Photo Button (only in normal mode) -->
  <ion-button 
    *ngIf="!isEditMode && getCurrentPhoto()"
    class="delete-photo-button" 
    fill="solid" 
    color="danger"
    (click)="deletePhoto(getCurrentPhoto()!.id); $event.stopPropagation()">
    <ion-icon name="trash" slot="start"></ion-icon>
    Eliminar
  </ion-button>

  <!-- Edit Mode: Photo Grid with Reordering -->
  <div class="edit-mode-container" *ngIf="isEditMode">
    <div class="edit-mode-header">
      <h3>Reorder Photos</h3>
      <p>Drag photos to change their order</p>
    </div>

    <ion-reorder-group (ionItemReorder)="reorderPhotos($event)" [disabled]="false">
      <ion-item *ngFor="let photo of photos; let i = index" class="photo-reorder-item">
        <ion-thumbnail slot="start">
          <img [src]="photo.url" />
        </ion-thumbnail>
        <ion-label>
          <h3>Photo {{ i + 1 }}</h3>
        </ion-label>
        <ion-reorder slot="end">
          <ion-icon name="reorder-three"></ion-icon>
        </ion-reorder>
      </ion-item>
    </ion-reorder-group>
  </div>

  <!-- Loading State -->
  <div class="loading-container" *ngIf="!story">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

</div>
